# docker-compose.yml
version: '3.9'
services:

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: thesis_review
      POSTGRES_USER: thesis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thesis"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://thesis:${POSTGRES_PASSWORD}@postgres:5432/thesis_review
      REDIS_HOST: redis
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      MAX_GRADE: 20
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "3001:3001"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      - api

  worker-plagiarism:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.worker
    command: node dist/jobs/plagiarism.worker.js
    environment:
      DATABASE_URL: postgresql://thesis:${POSTGRES_PASSWORD}@postgres:5432/thesis_review
      REDIS_HOST: redis
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      - postgres
      - redis
    deploy:
      replicas: 2

  worker-fine-tuning:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.worker
    command: node dist/jobs/fine-tuning.worker.js
    environment:
      DATABASE_URL: postgresql://thesis:${POSTGRES_PASSWORD}@postgres:5432/thesis_review
      REDIS_HOST: redis
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      FT_MIN_PAIRS: ${FT_MIN_PAIRS:-500}
    depends_on:
      - postgres
      - redis


volumes:
  pgdata:
  redisdata:
  miniodata:
